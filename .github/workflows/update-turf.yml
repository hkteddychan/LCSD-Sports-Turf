name: Update Turf Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Debug environment
        run: |
          python3 --version
          python3 -c "import sys; print(sys.version)"
          ls -la fetch_turf_data.py
          file fetch_turf_data.py
          head -5 fetch_turf_data.py
      - name: Fetch turf data
        run: |
          python3 fetch_turf_data.py 2>&1
        continue-on-error: true
      - name: Commit if changed
        run: |
          if git diff --quiet turf_data.json; then
            echo "No changes - skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add turf_data.json
            git commit -m "Auto-update turf_data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
